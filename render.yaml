services:
  # ── Backend — FastAPI ────────────────────────────────────────────────────────
  - type: web
    name: ez-nexus-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ez-nexus-db
          property: connectionString
      - key: BASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true

  # ── Frontend — React/Vite static site ────────────────────────────────────────
  - type: web
    name: ez-nexus-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ez-nexus-ai-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL Database ───────────────────────────────────────────────────────
databases:
  - name: ez-nexus-db
    plan: free
